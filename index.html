<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./modal.js" defer></script>
    <title>Modal Projects</title>
  </head>
  <body>
    <main>
      <section>
        <h2>Projects</h2>
        <ul id="project-container">
          <!-----------------------------------Index------------------------------------>
          <li>
            <article>
              <button type="button" class="project-card" data-index="0">
                <h3>Index</h3>
                <h4>Standard Homescreen</h4>
                <img src="./assests/practice_index.png" alt="Index Page" />
              </button>
            </article>
          </li>
          <!--------------------------------Dark Mode----------------------->
          <li>
            <article>
              <button type="button" class="project-card" data-index="1">
                <h3>Dark Mode</h3>
                <h4>Dark Mode Javascript</h4>
                <img src="./assests/dark_mode.png" alt="Dark Mode JavaScript" />
              </button>
            </article>
          </li>
          <!-----------------------------------Bento------------------------>
          <li>
            <article>
              <button type="button" class="project-card" data-index="2">
                <h3>Bento</h3>
                <h4>Bento Box Style Grid</h4>
                <img src="./assests/bento.png" alt="Bento Box Grid Page" />
              </button>
            </article>
          </li>
          <!-----------------------------------Weather---------------------->
          <li>
            <article>
              <button type="button" class="project-card" data-index="3">
                <h3>Weather</h3>
                <h4>Shows the Weather</h4>
                <img src="./assests/weather.png" alt="Weather Page" />
              </button>
            </article>
          </li>
          <!-----------------------------------Weather Script--------------->
          <li>
            <article>
              <button type="button" class="project-card" data-index="4">
                <h3>Weather Script</h3>
                <h4>The Javascript Used to Make the Weather</h4>
                <img
                  src="./assests/weather_script.png"
                  alt="Weather Javascript"
                />
              </button>
            </article>
          </li>
          <!-----------------------------------Project 1------------------------------------>
          <li>
            <article>
              <button type="button" class="project-card" data-index="5">
                <h3>Redesign</h3>
                <h4>Homepage Redesign</h4>
                <img src="./assests/daycare_remodel.png" alt="Project 1 Page" />
              </button>
            </article>
          </li>
          <!------------------------------------------------------------------------------->
          <dialog id="mydialog">
            <p id="project-title"></p>
            <p id="project-details"></p>
            <p id="project-link-text"></p>
            <p id="project-link"></p>
            <button id="close_button">Close</button>
          </dialog>
        </ul>
      </section>
    </main>
  </body>
</html>
